kind = "web"
previewPath = "/"
title = "SAT Prep App"
version = "1.0.0"
id = "artifacts/sat-prep"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8082

[services.development]
run = "pnpm --filter @workspace/sat-prep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sat-prep", "run", "build" ]
publicDir = "artifacts/sat-prep/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8082"
BASE_PATH = "/"
